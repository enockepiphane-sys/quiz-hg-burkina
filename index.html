<style>@keyframes cfall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
#music-toggle {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
  width: 54px; height: 54px; border-radius: 50%; border: none;
  font-size: 1.5rem; cursor: pointer;
  background: linear-gradient(135deg, #FFD700, #009A44);
  box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  transition: transform 0.2s;
}
#music-toggle:hover { transform: scale(1.12); }
#music-toggle.muted { background: #888; }
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --rouge: #EF2B2D;
    --vert: #009A44;
    --or: #FFD700;
    --noir: #1A1A1A;
    --blanc: #FFFFFF;
    --gris-clair: #F5F6F8;
    --gris-moyen: #E2E4E8;
    --gris-texte: #5A5F72;
    --ombre: 0 4px 24px rgba(0,0,0,0.10);
  }html, body { background: var(--vert); }
.header-top-bands { padding-top: env(safe-area-inset-top, 0px); }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--gris-clair);
    color: var(--noir);
    min-height: 100vh;
  }
</style>
<script>
(function() {
  let audioCtx, musicOn = false, melodyTimer = null, melodyIdx = 0;
  const MELODY = [523,659,784,659,523,392,440,523,659,784,880,784,659,523,587,659];

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playClick() {
    const ctx = getCtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'square'; o.frequency.value = 700;
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.06);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.06);
  }

  function playCorrect() {
    const ctx = getCtx();
    const dur = 2.2;
    const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 1200; filter.Q.value = 0.4;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.7, ctx.currentTime + 0.15);
    gain.gain.linearRampToValueAtTime(0.9, ctx.currentTime + 0.5);
    gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 1.2);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime + dur);
    [523, 659, 784].forEach((freq, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.13);
      g.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.13);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.13 + 0.28);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + i * 0.13);
      o.stop(ctx.currentTime + i * 0.13 + 0.3);
    });
    launchConfetti();
  }

  function playWrong() {
    const ctx = getCtx();
    [[494,0],[440,0.15],[392,0.3],[349,0.45]].forEach(([freq, t]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(freq, ctx.currentTime + t);
      g.gain.setValueAtTime(0.15, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.28);
    });
  }

  function playNote() {
    if (!musicOn) return;
    const ctx = getCtx();
    const freq = MELODY[melodyIdx++ % MELODY.length];
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.5);
    if (melodyIdx % 4 === 1) {
      const b = ctx.createOscillator(), bg = ctx.createGain();
      b.type = 'triangle'; b.frequency.value = freq / 2;
      bg.gain.setValueAtTime(0.05, ctx.currentTime);
      bg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      b.connect(bg); bg.connect(ctx.destination);
      b.start(); b.stop(ctx.currentTime + 0.4);
    }
  }
  function startMusic() {
    getCtx();
    if (!melodyTimer) { playNote(); melodyTimer = setInterval(playNote, 420); }
  }
  function stopMusic()  { clearInterval(melodyTimer); melodyTimer = null; }

  function launchConfetti() {
    const colors = ['#FFD700','#EF2B2D','#009A44','#ffffff','#9b59b6','#f39c12'];
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.style.cssText = `position:fixed;top:-14px;left:${Math.random()*100}vw;
          width:${8+Math.random()*8}px;height:${8+Math.random()*8}px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          border-radius:2px;pointer-events:none;z-index:9999;
          animation:cfall ${1.2+Math.random()*1.5}s linear forwards`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
      }, Math.random() * 300);
    }
  }

  window._audio = { playClick, playCorrect, playWrong, startMusic, stopMusic,
    toggleMusic: function() {
      musicOn = !musicOn;
      const btn = document.getElementById('music-toggle');
      if (musicOn) { if (btn) { btn.textContent='🎵'; btn.classList.remove('muted'); } startMusic(); }
      else          { if (btn) { btn.textContent='🔇'; btn.classList.add('muted'); }    stopMusic();  }
    }
  };

  document.addEventListener('click', function(e) {
    if (e.target.closest('.option-item,.vf-btn,.mode-btn,.btn-start,.btn-valider,.btn-suivant,.btn-passer,.btn-home-quiz,.btn-rejouer,.btn-restart,.lecon-check'))
      playClick();
  }, true);

  function watchEl(el) {
    new MutationObserver(() => {
      if ((el.classList.contains('correct')||el.classList.contains('correct-vrai')||el.classList.contains('correct-faux')) && !el.dataset.s1)
        { playCorrect(); el.dataset.s1='1'; }
      if ((el.classList.contains('wrong')||el.classList.contains('wrong-btn')) && !el.dataset.s2)
        { playWrong(); el.dataset.s2='1'; }
    }).observe(el, { attributes: true });
  }
  new MutationObserver(() => {
    document.querySelectorAll('.option-item:not([data-watched]),.vf-btn:not([data-watched])').forEach(el => {
      el.dataset.watched='1'; watchEl(el);
    });
  }).observe(document.body, { childList: true, subtree: true });
})();
</script>
